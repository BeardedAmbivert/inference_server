name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Pull the CPU-only torch build to keep the runner lean and fast.
  UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run pytest -q
